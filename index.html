<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary SEO -->
    <title>Krisha Systems | Enterprise IT Services & Staffing</title>

    <meta
      name="description"
      content="Krisha Systems provides enterprise IT services, cloud solutions, staffing, full stack development, SAP, Oracle, Salesforce, and Data & AI solutions for modern businesses."
    />

    <meta
      name="keywords"
      content="Krisha Systems, IT Services, IT Staffing, Full Stack Development, Cloud Solutions, Data AI, SAP, Oracle, Salesforce, React Development, Enterprise Technology"
    />

    <meta name="author" content="Krisha Systems" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <meta name="theme-color" content="#0f766e" />

    <!-- Canonical -->
    <link rel="canonical" href="https://krishasystems.com/" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Krisha Systems | Enterprise IT Services & Staffing"
    />

    <meta
      property="og:description"
      content="Enterprise IT services and staffing solutions including cloud, ERP, CRM, AI, and full stack development."
    />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://krishasystems.com/" />

    <meta
      property="og:image"
      content="https://krishasystems.com/og-image.png"
    />

    <meta property="og:site_name" content="Krisha Systems" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="Krisha Systems | Enterprise IT Services & Staffing"
    />

    <meta
      name="twitter:description"
      content="Enterprise IT services, staffing, cloud, AI, and engineering solutions."
    />

    <meta
      name="twitter:image"
      content="https://krishasystems.com/og-image.png"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192x192.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Theme Script -->
    <script>
      (function () {
        try {
          const theme = localStorage.getItem("krisha-theme");

          if (
            theme === "dark" ||
            (!theme &&
              window.matchMedia("(prefers-color-scheme: dark)").matches)
          ) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {
          console.error("Theme initialization failed:", e);
        }
      })();
    </script>

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Krisha Systems",
        "url": "https://krishasystems.com",
        "logo": "https://krishasystems.com/favicon-192x192.png",
        "sameAs": [],
        "description": "Enterprise IT services and staffing company providing cloud, AI, ERP, CRM, and engineering solutions."
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
